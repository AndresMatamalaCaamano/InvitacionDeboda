<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apertura de sobre de carta</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Agregada Amiri -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* 👇 AJUSTA ESTE VALOR PARA ACERCAR O ALEJAR TODO EL HTML EN CELULARES 👇 */
            /* 1.0 = Tamaño normal | 0.85 = Ligeramente alejado | 0.70 = Muy alejado */
            --zoom-celular: 0.83; 
        }

        /* Clase maestra que aplica el zoom a los contenedores */
        .zoom-control {
            transform: scale(var(--zoom-celular));
            transform-origin: center center;
            transition: transform 0.5s ease;
        }

        /* Desactiva el zoom en computadoras y tablets (tamaño original) */
        @media (min-width: 640px) {
            .zoom-control {
                transform: scale(1) !important;
            }
        }

        /* Configuraciones generales */
        body {
            font-family: 'Lato', sans-serif;
            background-color: #f2efeb;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* NUEVA TIPOGRAFÍA APLICADA */
        .font-amiri { font-family: 'Amiri', serif; }

        /* Textura para el sobre de carta */
        .paper-texture {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            mix-blend-mode: multiply;
            pointer-events: none;
            position: absolute;
            inset: 0;
            z-index: 50;
        }

        .polka-dots {
            background-color: #fdfbfb;
            background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='12' cy='12' r='4' fill='none' stroke='%23f4c2d0' stroke-width='1.5' opacity='0.7'/%3E%3C/svg%3E");
            background-size: 30px 30px;
        }

        /* Contenedor principal con perspectiva */
        .envelope-wrapper { 
            perspective: 2000px; 
            width: 85vw;
            max-width: 400px;
            position: relative;
        }
        
        .envelope-wrapper::before {
            content: "";
            display: block;
            padding-bottom: 70%; 
        }
        
        /* FIX iOS: Animación de la solapa SIN filter drop-shadow */
        .flap-top {
            transform-origin: top;
            transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 40;
            transform-style: preserve-3d;
            will-change: transform;
            transform: translateZ(0);
        }
        
        .flap-top.open {
            transform: rotateX(180deg) translateZ(0);
        }
        
        .letter-pull {
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
            will-change: transform;
        }
        .letter-pull.open {
            transform: translateY(-65%) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        
        .wax-seal {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .wax-seal.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .wax-seal.open {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
            pointer-events: none;
        }

        .guest-label-anim {
            opacity: 0;
            transform: translateX(-50%) translateY(-10px);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25, 1, 0.3, 1);
        }
        .guest-label-anim.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .guest-label-anim.open {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }
        
        .intro-anim-container {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1.5s cubic-bezier(0.25, 1, 0.3, 1);
        }

        .intro-anim-container.show {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(0.5deg); }
        }
        .floating {
            animation: float 5s ease-in-out infinite;
        }

        .text-fade-anim { opacity: 0; transition: opacity 1s ease; }
        .text-fade-anim.show { opacity: 1; }

        .title-fade-anim {
            opacity: 0;
            transform: translateY(-15px);
            transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.25, 1, 0.3, 1);
        }
        .title-fade-anim.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Animación para las flores enmarcadoras */
        .floral-anim {
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: opacity 1.5s ease, transform 1.5s cubic-bezier(0.25, 1, 0.3, 1);
        }
        .floral-anim.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* FIX DE RENDIMIENTO: translate3d para uso de GPU en móviles */
        .effect-particle {
            position: absolute;
            pointer-events: none;
            z-index: 9999;
            will-change: transform, opacity;
        }
        @keyframes particle-explode {
            0% { transform: translate3d(0, 0, 0) scale(0) rotate(0deg); opacity: 1; }
            20% { opacity: 1; }
            80% { opacity: 0.8; }
            100% { transform: translate3d(var(--tx), calc(var(--ty) + 100px), 0) scale(var(--scale)) rotate(var(--rot)); opacity: 0; }
        }
        .anim-particle {
            animation: particle-explode var(--duration) cubic-bezier(0.25, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInScreen {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- NUEVAS ANIMACIONES INTRODUCTORIAS --- */
        .anim-heart {
            /* Latido dura 0.5 segundos y se repite exactamente 2 veces */
            animation: beat-scale 0.5s ease-in-out 2 forwards;
            transform-origin: center;
        }
        .anim-rays {
            /* Rayos y círculo aparecen sincronizados con el latido, repitiéndose 2 veces */
            animation: beat-appear 0.5s ease-in-out 2 forwards;
            opacity: 0;
            transform-origin: center;
        }
        @keyframes beat-scale {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(1.15); }
        }
        @keyframes beat-appear {
            0% { opacity: 0; transform: scale(0.85); }
            25% { opacity: 1; transform: scale(1.05); }
            60% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(1); }
        }

        .circle-expand {
            animation: smooth-expand 0.8s cubic-bezier(0.5, 0, 0.2, 1) forwards;
        }
        @keyframes smooth-expand {
            0% { transform: scale(1); }
            20% { transform: scale(0.8); } /* Pequeño retroceso antes de estallar */
            100% { transform: scale(100); } /* Expansión masiva */
        }
        
        .fade-out-overlay {
            opacity: 0 !important;
            pointer-events: none;
        }
    </style>
</head>
<body class="h-full w-full relative antialiased selection:bg-[#eab6c4] selection:text-white flex items-center justify-center overflow-hidden">

    <!-- Definición de Peonías SVG para los enmarques (NO VISIBLE DIRECTAMENTE) -->
    <svg class="hidden absolute w-0 h-0">
        <defs>
            <!-- Peonía principal con pétalos ondulados estilo acuarela -->
            <g id="elegant-peony">
                <!-- Hojas base -->
                <path d="M0,0 Q-30,40 -80,10 Q-50,-20 0,0 Z" fill="#81a391" opacity="0.9"/>
                <path d="M0,0 Q40,60 70,-10 Q30,-40 0,0 Z" fill="#8ba696" opacity="0.8"/>
                <path d="M0,0 Q-10,-50 -50,-60 Q-60,-20 0,0 Z" fill="#7c9787" opacity="0.8"/>
                <!-- Capas de pétalos voluminosos y ondeados -->
                <path d="M 0,-50 Q 20,-50 25,-30 Q 45,-40 50,-20 Q 65,-10 50,15 Q 60,35 40,40 Q 25,60 5,50 Q -15,65 -35,45 Q -55,40 -45,20 Q -60,0 -40,-20 Q -35,-45 -15,-40 Q -5,-60 0,-50 Z" fill="#eab6c4" opacity="0.8"/>
                <path d="M 0,-45 Q 15,-45 20,-25 Q 40,-30 45,-10 Q 55,-5 45,15 Q 50,30 35,35 Q 20,50 5,40 Q -10,55 -25,40 Q -45,35 -35,15 Q -50,5 -35,-15 Q -25,-35 -10,-30 Q -5,-50 0,-45 Z" fill="#f4c2d0" opacity="0.9" transform="rotate(45) scale(0.9)"/>
                <path d="M 0,-35 Q 10,-35 15,-20 Q 30,-25 35,-10 Q 45,-5 35,10 Q 40,25 25,30 Q 15,40 0,35 Q -10,45 -20,30 Q -35,25 -25,10 Q -40,0 -25,-10 Q -15,-25 -5,-20 Q 0,-40 0,-35 Z" fill="#dca0b1" opacity="0.85" transform="rotate(90) scale(0.8)"/>
                <!-- Centro concentrado de la flor -->
                <path d="M 0,-25 Q 10,-25 10,-10 Q 25,-15 20,0 Q 25,15 10,10 Q 10,25 0,20 Q -10,25 -10,10 Q -25,15 -20,0 Q -25,-15 -10,-10 Q -10,-25 0,-25 Z" fill="#fdfbfb" opacity="0.6" transform="rotate(135) scale(0.7)"/>
                <circle cx="0" cy="0" r="12" fill="#dca0b1"/>
                <!-- Estambres dorados/amarillos centrales -->
                <g fill="#e8c251">
                    <circle cx="-3" cy="-3" r="2"/><circle cx="4" cy="-5" r="1.5"/><circle cx="5" cy="3" r="2"/>
                    <circle cx="-2" cy="5" r="1.5"/><circle cx="0" cy="0" r="2.5"/><circle cx="-7" cy="1" r="1.5"/>
                    <circle cx="6" cy="-1" r="1.5"/><circle cx="-4" cy="4" r="1"/><circle cx="2" cy="-6" r="1"/>
                </g>
            </g>
            <!-- Ramo completo combinando varias peonías -->
            <g id="peony-bouquet">
                <use href="#elegant-peony" transform="translate(45, -35) scale(0.65) rotate(45)" />
                <use href="#elegant-peony" transform="translate(-35, 25) scale(0.75) rotate(-30)" />
                <use href="#elegant-peony" transform="translate(0, 0) scale(1) rotate(0)" />
            </g>
        </defs>
    </svg>

    <!-- OVERLAY DE INTRODUCCIÓN (NUEVO) -->
    <div id="pre-intro-overlay" class="absolute inset-0 z-[9999] flex items-center justify-center bg-[#f2efeb] transition-opacity duration-1000 overflow-hidden">
        
        <!-- WRAPPER MAESTRO DE ZOOM APLICADO A LA ENTRADA -->
        <div class="zoom-control flex items-center justify-center w-full h-full">
            <!-- Contenedor agrupado que realizará la expansión final -->
            <div id="intro-pulse-group" class="relative flex items-center justify-center w-40 h-40 z-10">
                
                <!-- Grupo de Círculo y Rayos separados para centrado perfecto -->
                <svg class="anim-rays absolute inset-0 w-full h-full text-[#7c9787]" viewBox="0 0 100 100" overflow="visible">
                    <!-- Círculo que encierra al corazón -->
                    <circle cx="50" cy="50" r="28" fill="none" stroke="currentColor" stroke-width="2.5" />
                    
                    <!-- Puntos circulares alrededor (Reemplazo de las líneas) -->
                    <g fill="currentColor" stroke="none">
                        <!-- Rectos -->
                        <circle cx="50" cy="8" r="3.5" />
                        <circle cx="50" cy="92" r="3.5" />
                        <circle cx="8" cy="50" r="3.5" />
                        <circle cx="92" cy="50" r="3.5" />
                        <!-- Diagonales -->
                        <g transform="rotate(45 50 50)">
                            <circle cx="50" cy="8" r="3.5" />
                            <circle cx="50" cy="92" r="3.5" />
                            <circle cx="8" cy="50" r="3.5" />
                            <circle cx="92" cy="50" r="3.5" />
                        </g>
                    </g>
                </svg>

                <!-- Corazón Central (Palpita) independizado -->
                <svg class="anim-heart relative w-14 h-14 text-[#7c9787] mt-[2px]" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>
        </div>
    </div>

    <div id="page-wrapper" class="w-full absolute inset-0 z-50 flex items-center justify-center transition-opacity duration-1000 pointer-events-none">
        
        <!-- WRAPPER MAESTRO DE ZOOM APLICADO AL SOBRE Y FLORES -->
        <div class="zoom-control flex items-center justify-center w-full h-full pointer-events-auto">
            <div id="intro-presentation" class="intro-anim-container flex flex-col items-center w-full px-4 pb-32 sm:pb-15">
                
                <!-- Anuncio de Boda Superior (Todo en Amiri) -->
                <div id="wedding-announcement" class="title-fade-anim text-center mb-8 sm:mb-12 transition-opacity duration-700">
                    <p class="font-amiri text-[12px] sm:text-[14px] text-[#7c9787] font-bold tracking-[0.3em] uppercase mb-2 drop-shadow-sm">Con gran alegría anunciamos que</p>
                    <h1 class="font-amiri text-5xl sm:text-6xl text-[#5a7d6a] italic font-bold drop-shadow-sm mt-2">¡Nos casamos!</h1>
                </div>

                <div id="envelope-floater" class="floating">
                    <!-- Contenedor del sobre responsivo -->
                    <div class="envelope-wrapper">
                        
                        <!-- FLORES PEGADAS AL SOBRE (Izquierda y Derecha) -->
                        <div id="floral-left" class="floral-anim absolute -left-20 -bottom-12 sm:-left-24 sm:-bottom-16 w-44 h-44 sm:w-56 sm:h-56 pointer-events-none z-[42] -rotate-12">
                            <svg viewBox="-100 -100 200 200" class="w-full h-full drop-shadow-[0_5px_10px_rgba(0,0,0,0.2)]">
                                <use href="#peony-bouquet" />
                            </svg>
                        </div>
                        
                        <div id="floral-right" class="floral-anim absolute -right-20 -bottom-12 sm:-right-24 sm:-bottom-16 w-44 h-44 sm:w-56 sm:h-56 pointer-events-none z-[42] rotate-12">
                            <svg viewBox="-100 -100 200 200" class="w-full h-full drop-shadow-[0_5px_10px_rgba(0,0,0,0.2)]">
                                <use href="#peony-bouquet" transform="scale(-1, 1)" />
                            </svg>
                        </div>

                        <!-- Fondo interior del sobre -->
                        <div class="absolute inset-0 bg-[#7c9787] rounded-md shadow-[0_20px_40px_rgba(0,0,0,0.12)] overflow-hidden z-[10]">
                            <div class="paper-texture"></div>
                            <div class="absolute inset-0 shadow-[inset_0_30px_50px_rgba(0,0,0,0.3)]"></div>
                        </div>
                        
                        <!-- La Carta asomándose (Todo en Amiri) -->
                        <div id="envelope-letter" class="letter-pull absolute top-2 left-3 right-3 bottom-2 bg-white rounded flex flex-col items-center pt-8 shadow-inner overflow-hidden border border-gray-100">

                            <div class="w-[60%] h-[1px] bg-gradient-to-r from-transparent via-[#d4af37]/60 to-transparent absolute top-6"></div>
                            
                            <h2 class="font-amiri font-bold text-5xl sm:text-6xl text-[#5a7d6a] mt-4 relative z-10 drop-shadow-sm">A<span class="text-[#eab6c4] mx-1">&</span>P</h2>

                        </div>

                        <!-- Solapas frontales estáticas -->
                        <div class="absolute inset-0 pointer-events-none rounded-md overflow-hidden">
                            <!-- Solapa Izquierda -->
                            <div class="absolute inset-0 z-[31]" style="filter: drop-shadow(4px 0 10px rgba(0,0,0,0.15));">
                                <div class="absolute top-0 bottom-0 left-0 w-[52%] bg-[#81a391]" style="clip-path: polygon(0 0, 100% 50%, 0 100%);">
                                    <div class="paper-texture"></div>
                                </div>
                            </div>
                            <!-- Solapa Derecha -->
                            <div class="absolute inset-0 z-[31]" style="filter: drop-shadow(-4px 0 10px rgba(0,0,0,0.15));">

                                </div>
                            </div>
                            <!-- Solapa Inferior -->

                        <!-- FIX iOS: Elemento falso para sombra -->

                        <!-- Cuadro de Invitaciones (Todo en Amiri) -->

                            <p id="instruction-text" class="text-[15px] sm:text-[17px] text-[#5a7d6a] font-bold font-amiri tracking-[0.2em] text-center animate-bounce drop-shadow-md uppercase">
                                Toca el sello para abrir
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Animaciones de Entrada Inicial
        window.addEventListener('load', () => {
            const overlay = document.getElementById('pre-intro-overlay');
            const pulseGroup = document.getElementById('intro-pulse-group');

            setTimeout(() => {
                pulseGroup.classList.add('circle-expand');
                
                setTimeout(() => {
                    overlay.classList.add('fade-out-overlay');
                    
                    setTimeout(() => document.getElementById('intro-presentation').classList.add('show'), 100);
                    setTimeout(() => document.getElementById('wedding-announcement').classList.add('show'), 600);
                    setTimeout(() => document.getElementById('wax-seal').classList.add('show'), 1000);
                    
                    setTimeout(() => {
                        document.getElementById('floral-left')?.classList.add('show');
                        document.getElementById('floral-right')?.classList.add('show');
                        document.getElementById('guest-label').classList.add('show');
                    }, 1400); 

                    setTimeout(() => document.getElementById('instruction-wrapper').classList.add('show'), 2000);
                    
                    setTimeout(() => {
                        overlay.style.display = 'none';
                    }, 1000); 

                }, 500); 

            }, 1000); 
        });

        let isOpened = false;

        function openEnvelope() {
            if (isOpened) return;
            isOpened = true;

            const seal = document.getElementById('wax-seal');
            const guestLabel = document.getElementById('guest-label');
            const flap = document.getElementById('envelope-flap');
            const fakeShadow = document.getElementById('flap-fake-shadow');
            const letter = document.getElementById('envelope-letter');
            const textInstr = document.getElementById('instruction-wrapper');
            const announcement = document.getElementById('wedding-announcement');

            seal.classList.add('open');
            guestLabel.classList.add('open');
            textInstr.classList.remove('show');
            announcement.style.opacity = '0';
            fakeShadow.style.opacity = '0';

            spawnEffects();

            setTimeout(() => {
                flap.classList.add('open');
                setTimeout(() => { flap.style.zIndex = '15'; }, 400); 
            }, 250);

            setTimeout(() => { letter.classList.add('open'); }, 1000);

            setTimeout(() => {
                window.location.href = 'info.html';
            }, 3000);
        }

        // Función generadora de Brillos (Optimizada para Móviles y adaptada al zoom global)
        function spawnEffects() {
            const seal = document.getElementById('wax-seal');
            const rect = seal.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const isMobile = window.innerWidth < 680;
            
            // Leemos el zoom maestro de CSS para ajustar también el tamaño de los brillos
            const rootStyles = getComputedStyle(document.documentElement);
            const zoomValue = parseFloat(rootStyles.getPropertyValue('--zoom-celular')) || 0.75;
            const mobileScale = isMobile ? zoomValue : 1;

            const distanceMultiplier = (isMobile ? 0.6 : 1) * mobileScale;
            const sizeMultiplier = (isMobile ? 0.8 : 1) * mobileScale;


            const countMultiplier = isMobile ? 0.4 : 2; 

            const fragment = document.createDocumentFragment();

            const svgs = {
                sparkle: `<svg viewBox="0 0 24 24" fill="#d4af37"><path d="M12 0l2.5 8.5L23 11l-8.5 2.5L12 22l-2.5-8.5L1 11l8.5-2.5z"/></svg>`,
                petal1: `<svg viewBox="0 0 24 24" class="w-full h-full"><defs><radialGradient id="grad-p1" cx="50%" cy="100%" r="100%"><stop offset="0%" stop-color="#8c445a" /><stop offset="40%" stop-color="#dca0b1" /><stop offset="100%" stop-color="#ffffff" /></radialGradient></defs><path d="M12 22C8 20 2 14 3 9C4 5 9 4 11 6C11.5 5.5 12.5 5.5 13 6C15 4 20 5 21 9C22 14 16 20 12 22Z" fill="url(#grad-p1)" stroke="#000" stroke-width="0.2"/><g stroke="#000" stroke-width="0.27" opacity="0.7" fill="none"><path d="M12 21.5 Q12 14 12 7" /><path d="M12 21.5 Q9 16 7 10"/><path d="M12 21.5 Q15 16 17 10"/></g></svg>`,
                petal2: `<svg viewBox="0 0 24 24" class="w-full h-full"><defs><radialGradient id="grad-p2" cx="50%" cy="100%" r="100%"><stop offset="0%" stop-color="#8c445a" /><stop offset="50%" stop-color="#dca0b1" /><stop offset="100%" stop-color="#fdf2f0" /></radialGradient></defs><path d="M8 22C4 20 2 14 5 7C8 2 13 4 16 8C19 12 17 18 8 22Z" fill="url(#grad-p2)" stroke="#000" stroke-width="0.2"/><g stroke="#000" stroke-width="0.27" opacity="0.7" fill="none"><path d="M8.5 21.5 Q10 14 13 8"/><path d="M8.5 21.5 Q 7 15 6 10"/></g></svg>`,
                petal3: `<svg viewBox="0 0 24 24" class="w-full h-full"><defs><radialGradient id="grad-p3" cx="50%" cy="100%" r="100%"><stop offset="0%" stop-color="#8c445a"/><stop offset="100%" stop-color="#fff"/></radialGradient></defs><path d="M12 22C10 21 5 14 6 7C7 2 12 1 12 6C12 1 17 2 18 7C19 14 14 21 12 22Z" fill="url(#grad-p3)" stroke="#000" stroke-width="0.2"/><path d="M12 21.5 L12 7" stroke="#000" stroke-width="0.27" opacity="0.6" fill="none"/></svg>`,
                petal4: `<svg viewBox="0 0 24 24" class="w-full h-full"><defs><radialGradient id="grad-p4" cx="50%" cy="100%" r="100%"><stop offset="0%" stop-color="#8c445a"/><stop offset="100%" stop-color="#fdf2f0"/></radialGradient></defs><path d="M12 22C8 21 4 15 4 8C4 4 10 3 12 5C14 3 20 4 20 8C20 15 16 21 12 22Z" fill="url(#grad-p4)" stroke="#000" stroke-width="0.2"/><g stroke="#000" stroke-width="0.27" opacity="0.7" fill="none"><path d="M12 21.5 Q10.5 15 11 8"/><path d="M12 21.5 Q13.5 15 14 8"/></g></svg>`,
                petal5: `<svg viewBox="0 0 24 24" class="w-full h-full"><defs><radialGradient id="grad-p5" cx="50%" cy="100%" r="100%"><stop offset="0%" stop-color="#8c445a"/><stop offset="100%" stop-color="#fff"/></radialGradient></defs><path d="M6 22C4 20 2 12 8 6C12 2 18 4 21 9C23 15 18 21 6 22Z" fill="url(#grad-p5)" stroke="#000" stroke-width="0.2"/><path d="M6.5 21.5 Q 12 16 16.5 10.5" stroke="#000" stroke-width="0.27" fill="none" opacity="0.5"/></svg>`,
                petal6: `<svg viewBox="0 0 24 24" class="w-full h-full"><defs><radialGradient id="grad-p6" cx="50%" cy="100%" r="100%"><stop offset="0%" stop-color="#8c445a"/><stop offset="100%" stop-color="#fdf2f0"/></radialGradient></defs><path d="M12 20C9 18 6 14 6 9C6 6 10 5 12 7C14 5 18 6 18 9C18 14 15 18 12 20Z" fill="url(#grad-p6)" stroke="#000" stroke-width="0.2"/><path d="M12 19.5Q12 13 12 9" stroke="#000" stroke-width="0.27" fill="none" opacity="0.6"/></svg>`,
                leaf: `<svg viewBox="0 0 24 24" class="w-full h-full" overflow="visible"><path d="M12 22 L12 24" stroke="#8ba696" stroke-width="1.5" stroke-linecap="round"/><path d="M12 22.5 C14.5 21 16.5 18 15.5 15 C17.5 13 17.5 9 14.5 6 C14.5 4 13.5 2 12 1 C10.5 2 9.5 4 9.5 6 C6.5 9 6.5 13 8.5 15 C7.5 18 9.5 21 12 22.5 Z" fill="#8ba696" stroke="#000" stroke-width="0.2"/><path d="M12 22.5 Q12.5 12 12 1.5 M12.2 20 Q14 19.5 14.5 18 M12.1 20.5 Q10 20 9.5 18.5 M12.4 17.5 Q14.5 16 15.5 14 M12.3 18 Q9.5 16.5 8.5 14.5 M12.6 14.5 Q15 12 15.5 10 M12.4 15 Q9 12.5 8.5 10.5 M12.5 11.5 Q14 9.5 13.8 7.5 M12.5 12 Q10 10 10.2 8 M12.4 8.5 Q13.5 7 13.2 5 M12.3 9 Q10.5 7.5 10.8 5.5 M12.2 5.5 Q13 4.5 12.8 3 M12.1 6 Q11 5 11.2 3.5" stroke="#000" stroke-width="0.27" fill="none" stroke-linecap="round"/></svg>`
            };

            const createParticle = (type, amount) => {
                for (let i = 0; i < amount; i++) {
                    const el = document.createElement('div');
                    el.innerHTML = svgs[type];
                    el.className = 'effect-particle anim-particle';
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance = (type === 'sparkle') 
                        ? (Math.random() * 250 + 270) * distanceMultiplier 
                        : (Math.random() * 450 + 255) * distanceMultiplier;
                    
                    const tx = Math.cos(angle) * distance;
                    const ty = Math.sin(angle) * distance - (isMobile ? 90 : 120);
                    
                    const rot = Math.random() * 720;
                    const scale = (type === 'sparkle') 
                        ? (Math.random() * 1.2 + 0.8) * sizeMultiplier 
                        : (Math.random() * 2.0 + 1.2) * sizeMultiplier;
                    const duration = Math.random() * 1.5 + 1.5;
                    const size = (type === 'sparkle') ? 22 : 36;

                    el.style.left = `${centerX - size/2}px`;
                    el.style.top = `${centerY - size/2}px`;
                    el.style.width = `${size}px`;
                    el.style.height = `${size}px`;
                    el.style.setProperty('--tx', `${tx}px`);
                    el.style.setProperty('--ty', `${ty}px`);
                    el.style.setProperty('--rot', `${rot}deg`);
                    el.style.setProperty('--scale', scale);
                    el.style.setProperty('--duration', `${duration}s`);

                    fragment.appendChild(el);
                    setTimeout(() => el.remove(), duration * 1000);
                }
            };

            createParticle('sparkle', Math.floor(50 * countMultiplier));
            createParticle('petal1', Math.floor(50 * countMultiplier)); 
            createParticle('petal2', Math.floor(50 * countMultiplier));
            createParticle('petal3', Math.floor(50 * countMultiplier));
            createParticle('petal4', Math.floor(50 * countMultiplier));
            createParticle('petal5', Math.floor(50 * countMultiplier));
            createParticle('petal6', Math.floor(50 * countMultiplier));
            createParticle('leaf', Math.floor(50 * countMultiplier)); 

            document.body.appendChild(fragment);
        }
    </script>
</body>
</html>
