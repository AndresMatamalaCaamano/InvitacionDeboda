<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apertura de sobre de carta</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Agregada Amiri -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="Css\Css.css">

</head>
<body class="h-full w-full relative antialiased selection:bg-[#eab6c4] selection:text-white flex items-center justify-center overflow-hidden">

    <!-- Definición de Peonías SVG para los enmarques (NO VISIBLE DIRECTAMENTE) -->
    <svg class="hidden absolute w-0 h-0">
        <defs>
            <!-- Peonía principal con pétalos ondulados estilo acuarela -->
            <g id="elegant-peony">
                <!-- Hojas base -->
                <path d="M0,0 Q-30,40 -80,10 Q-50,-20 0,0 Z" fill="#81a391" opacity="0.9"/>
                <path d="M0,0 Q40,60 70,-10 Q30,-40 0,0 Z" fill="#8ba696" opacity="0.8"/>
                <path d="M0,0 Q-10,-50 -50,-60 Q-60,-20 0,0 Z" fill="#7c9787" opacity="0.8"/>
                <!-- Capas de pétalos voluminosos y ondeados -->
                <path d="M 0,-50 Q 20,-50 25,-30 Q 45,-40 50,-20 Q 65,-10 50,15 Q 60,35 40,40 Q 25,60 5,50 Q -15,65 -35,45 Q -55,40 -45,20 Q -60,0 -40,-20 Q -35,-45 -15,-40 Q -5,-60 0,-50 Z" fill="#eab6c4" opacity="0.8"/>
                <path d="M 0,-45 Q 15,-45 20,-25 Q 40,-30 45,-10 Q 55,-5 45,15 Q 50,30 35,35 Q 20,50 5,40 Q -10,55 -25,40 Q -45,35 -35,15 Q -50,5 -35,-15 Q -25,-35 -10,-30 Q -5,-50 0,-45 Z" fill="#f4c2d0" opacity="0.9" transform="rotate(45) scale(0.9)"/>
                <path d="M 0,-35 Q 10,-35 15,-20 Q 30,-25 35,-10 Q 45,-5 35,10 Q 40,25 25,30 Q 15,40 0,35 Q -10,45 -20,30 Q -35,25 -25,10 Q -40,0 -25,-10 Q -15,-25 -5,-20 Q 0,-40 0,-35 Z" fill="#dca0b1" opacity="0.85" transform="rotate(90) scale(0.8)"/>
                <!-- Centro concentrado de la flor -->
                <path d="M 0,-25 Q 10,-25 10,-10 Q 25,-15 20,0 Q 25,15 10,10 Q 10,25 0,20 Q -10,25 -10,10 Q -25,15 -20,0 Q -25,-15 -10,-10 Q -10,-25 0,-25 Z" fill="#fdfbfb" opacity="0.6" transform="rotate(135) scale(0.7)"/>
                <circle cx="0" cy="0" r="12" fill="#dca0b1"/>
                <!-- Estambres dorados/amarillos centrales -->
                <g fill="#e8c251">
                    <circle cx="-3" cy="-3" r="2"/><circle cx="4" cy="-5" r="1.5"/><circle cx="5" cy="3" r="2"/>
                    <circle cx="-2" cy="5" r="1.5"/><circle cx="0" cy="0" r="2.5"/><circle cx="-7" cy="1" r="1.5"/>
                    <circle cx="6" cy="-1" r="1.5"/><circle cx="-4" cy="4" r="1"/><circle cx="2" cy="-6" r="1"/>
                </g>
            </g>
            <!-- Ramo completo combinando varias peonías -->
            <g id="peony-bouquet">
                <use href="#elegant-peony" transform="translate(45, -35) scale(0.65) rotate(45)" />
                <use href="#elegant-peony" transform="translate(-35, 25) scale(0.75) rotate(-30)" />
                <use href="#elegant-peony" transform="translate(0, 0) scale(1) rotate(0)" />
            </g>
        </defs>
    </svg>

    <!-- OVERLAY DE INTRODUCCIÓN (NUEVO) -->
    <div id="pre-intro-overlay" class="absolute inset-0 z-[9999] flex items-center justify-center bg-[#f2efeb] transition-opacity duration-1000 overflow-hidden">
        
        <!-- WRAPPER MAESTRO DE ZOOM APLICADO A LA ENTRADA -->
        <div class="zoom-control flex items-center justify-center w-full h-full">
            <!-- Contenedor agrupado que realizará la expansión final -->
            <div id="intro-pulse-group" class="relative flex items-center justify-center w-40 h-40 z-10">
                
                <!-- Grupo de Círculo y Rayos separados para centrado perfecto -->
                <svg class="anim-rays absolute inset-0 w-full h-full text-[#7c9787]" viewBox="0 0 100 100" overflow="visible">
                    <!-- Círculo que encierra al corazón -->
                    <circle cx="50" cy="50" r="28" fill="none" stroke="currentColor" stroke-width="2.5" />
                    
                    <!-- Puntos circulares alrededor (Reemplazo de las líneas) -->
                    <g fill="currentColor" stroke="none">
                        <!-- Rectos -->
                        <circle cx="50" cy="8" r="3.5" />
                        <circle cx="50" cy="92" r="3.5" />
                        <circle cx="8" cy="50" r="3.5" />
                        <circle cx="92" cy="50" r="3.5" />
                        <!-- Diagonales -->
                        <g transform="rotate(45 50 50)">
                            <circle cx="50" cy="8" r="3.5" />
                            <circle cx="50" cy="92" r="3.5" />
                            <circle cx="8" cy="50" r="3.5" />
                            <circle cx="92" cy="50" r="3.5" />
                        </g>
                    </g>
                </svg>

                <!-- Corazón Central (Palpita) independizado -->
                <svg class="anim-heart relative w-14 h-14 text-[#7c9787] mt-[2px]" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>
        </div>
    </div>

    <div id="page-wrapper" class="w-full absolute inset-0 z-50 flex items-center justify-center transition-opacity duration-1000 pointer-events-none">
        
        <!-- WRAPPER MAESTRO DE ZOOM APLICADO AL SOBRE Y FLORES -->
        <div class="zoom-control flex items-center justify-center w-full h-full pointer-events-auto">
            <div id="intro-presentation" class="intro-anim-container flex flex-col items-center w-full px-4 pb-32 sm:pb-15">
                
                <!-- Anuncio de Boda Superior (Todo en Amiri) -->
                <div id="wedding-announcement" class="title-fade-anim text-center mb-8 sm:mb-12 transition-opacity duration-700">
                    <p class="font-amiri text-[12px] sm:text-[14px] text-[#7c9787] font-bold tracking-[0.3em] uppercase mb-2 drop-shadow-sm">Con gran alegría anunciamos que</p>
                    <h1 class="font-amiri text-5xl sm:text-6xl text-[#5a7d6a] italic font-bold drop-shadow-sm mt-2">¡Nos casamos!</h1>
                </div>

                <div id="envelope-floater" class="floating">
                    <!-- Contenedor del sobre responsivo -->
                    <div class="envelope-wrapper">
                        
                        <!-- FLORES PEGADAS AL SOBRE (Izquierda y Derecha) -->
                        <div id="floral-left" class="floral-anim absolute -left-20 -bottom-12 sm:-left-24 sm:-bottom-16 w-44 h-44 sm:w-56 sm:h-56 pointer-events-none z-[42] -rotate-12">
                            <svg viewBox="-100 -100 200 200" class="w-full h-full drop-shadow-[0_5px_10px_rgba(0,0,0,0.2)]">
                                <use href="#peony-bouquet" />
                            </svg>
                        </div>
                        
                        <div id="floral-right" class="floral-anim absolute -right-20 -bottom-12 sm:-right-24 sm:-bottom-16 w-44 h-44 sm:w-56 sm:h-56 pointer-events-none z-[42] rotate-12">
                            <svg viewBox="-100 -100 200 200" class="w-full h-full drop-shadow-[0_5px_10px_rgba(0,0,0,0.2)]">
                                <use href="#peony-bouquet" transform="scale(-1, 1)" />
                            </svg>
                        </div>

                        <!-- Fondo interior del sobre -->
                        <div class="absolute inset-0 bg-[#7c9787] rounded-md shadow-[0_20px_40px_rgba(0,0,0,0.12)] overflow-hidden z-[10]">
                            <div class="paper-texture"></div>
                            <div class="absolute inset-0 shadow-[inset_0_30px_50px_rgba(0,0,0,0.3)]"></div>
                        </div>
                        
                        <!-- La Carta asomándose (Todo en Amiri) -->
                        <div id="envelope-letter" class="letter-pull absolute top-2 left-3 right-3 bottom-2 bg-white rounded flex flex-col items-center pt-8 shadow-inner overflow-hidden border border-gray-100">
                            <div class="absolute inset-2 border border-[#d4af37]/40 rounded-t-[40px] pointer-events-none"></div>
                            <div class="absolute inset-3 border-[0.5px] border-[#d4af37]/20 rounded-t-[36px] pointer-events-none"></div>
                            <div class="w-[60%] h-[1px] bg-gradient-to-r from-transparent via-[#d4af37]/60 to-transparent absolute top-6"></div>
                            
                            <h2 class="font-amiri font-bold text-5xl sm:text-6xl text-[#5a7d6a] mt-4 relative z-10 drop-shadow-sm">A<span class="text-[#eab6c4] mx-1">|</span>P</h2>
                            <p class="font-amiri font-bold mt-2 text-[12px] sm:text-[13px] text-[#dca0b1] tracking-[0.3em] uppercase relative z-10">Estás invitado</p>
                        </div>

                        <!-- Solapas frontales estáticas -->
                        <div class="absolute inset-0 pointer-events-none rounded-md overflow-hidden">
                            <!-- Solapa Izquierda -->
                            <div class="absolute inset-0 z-[31]" style="filter: drop-shadow(4px 0 10px rgba(0,0,0,0.15));">
                                <div class="absolute top-0 bottom-0 left-0 w-[52%] bg-[#81a391]" style="clip-path: polygon(0 0, 100% 50%, 0 100%);">
                                    <div class="paper-texture"></div>
                                </div>
                            </div>
                            <!-- Solapa Derecha -->
                            <div class="absolute inset-0 z-[31]" style="filter: drop-shadow(-4px 0 10px rgba(0,0,0,0.15));">
                                <div class="absolute top-0 bottom-0 right-0 w-[52%] bg-[#769784]" style="clip-path: polygon(100% 0, 0 50%, 100% 100%);">
                                    <div class="paper-texture"></div>
                                </div>
                            </div>
                            <!-- Solapa Inferior -->
                            <div class="absolute inset-0 z-[32]" style="filter: drop-shadow(0 -5px 12px rgba(0,0,0,0.2));">
                                <div class="absolute bottom-0 left-0 right-0 h-[58%] bg-[#8ba696]" style="clip-path: polygon(0 100%, 50% 0, 100% 100%);">
                                    <div class="paper-texture"></div>
                                </div>
                            </div>
                        </div>

                        <!-- FIX iOS: Elemento falso para sombra -->
                        <div id="flap-fake-shadow" class="absolute inset-0 pointer-events-none z-[39] transition-opacity duration-300" style="filter: drop-shadow(0 4px 10px rgba(0,0,0,0.25));">
                            <div class="absolute top-0 left-0 right-0 h-[62%]" style="clip-path: polygon(0 0, 100% 0, 50% 100%);">
                                <div class="w-full h-full bg-black/5"></div>
                            </div>
                        </div>

                        <!-- Solapa superior animada -->
                        <div id="envelope-flap" class="flap-top absolute inset-0 pointer-events-none">
                            <div class="absolute top-0 left-0 right-0 h-[62%] bg-[#9bc1ad]" style="clip-path: polygon(0 0, 100% 0, 50% 100%); backface-visibility: hidden; -webkit-backface-visibility: hidden;">
                                <div class="paper-texture"></div>
                            </div>
                            <div class="absolute top-0 left-0 right-0 h-[62%] polka-dots" style="clip-path: polygon(0 0, 100% 0, 50% 100%); transform: rotateY(180deg); backface-visibility: hidden; -webkit-backface-visibility: hidden;">
                                <div class="absolute inset-0 shadow-[inset_0_10px_20px_rgba(0,0,0,0.06)]"></div>
                            </div>
                        </div>

                        <!-- Sello de Lacre (Tamaño Intermedio) -->
                        <div id="wax-seal" onclick="openEnvelope()" class="wax-seal absolute z-50 top-[55%] left-1/2 -translate-x-1/2 -translate-y-1/2 cursor-pointer w-[68px] h-[68px] sm:w-[78px] sm:h-[78px] flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
                            <div class="absolute inset-0 bg-gradient-to-br from-[#dccfae] via-[#bca371] to-[#8d7647]" style="border-radius: 47% 53% 54% 46% / 46% 48% 52% 54%; box-shadow: 0 6px 12px rgba(0,0,0,0.15), inset 2px 2px 4px rgba(255,255,255,0.7), inset -2px -2px 6px rgba(141,118,71,0.6);"></div>
                            <div class="absolute inset-[7px] sm:inset-[8px] bg-[#bca371]" style="border-radius: 50%; box-shadow: inset 3px 3px 6px rgba(141,118,71,0.8), inset -2px -2px 4px rgba(255,255,255,0.4), 0 1px 2px rgba(255,255,255,0.7), 0 -1px 2px rgba(141,118,71,0.4);"></div>
                            <div class="absolute inset-[11px] sm:inset-[13px] border-[0.5px] border-[#fdfbfb] rounded-full opacity-80" style="box-shadow: inset 0 1px 2px rgba(141,118,71,0.5), 0 1px 1px rgba(255,255,255,0.4);"></div>
                            <div class="absolute top-[12%] left-[18%] w-[18%] h-[10%] bg-white opacity-40 rounded-full rotate-[-40deg] blur-[1px]"></div>
                            <div class="absolute -right-[2px] top-[30%] w-[5px] h-[10px] bg-[#a68d5c] rounded-full opacity-80 blur-[0.5px]"></div>
                            <div class="absolute -bottom-[1px] left-[35%] w-[8px] h-[4px] bg-[#a68d5c] rounded-full opacity-70 blur-[0.5px]"></div>
                            <span class="font-amiri font-bold text-[#fdfbfb] text-[18px] sm:text-[22px] tracking-wide whitespace-nowrap relative z-10" style="text-shadow: 1px 1px 2px rgba(141,118,71,0.9), -1px -1px 1px rgba(255,255,255,0.6);">
                                A&P
                            </span>
                        </div>

                        
                        <!-- Cuadro de Invitaciones (Todo en Amiri) -->
                        <div id="guest-label" class="guest-label-anim absolute -bottom-16 sm:-bottom-16 left-1/2 -translate-x-1/2 z-[45] bg-white px-8 py-4 sm:py-5 rounded-[14px] shadow-[0_15px_30px_rgba(0,0,0,0.1)] text-center w-[90%] max-w-[280px]">
                            <h3 class="font-amiri text-[#5a7d6a] font-bold text-[16px] sm:text-[18px] tracking-[0.15em] uppercase mb-[6px] drop-shadow-sm">Invitación</h3>
                            <p class="font-amiri font-bold text-[13px] sm:text-[14px] text-[#dca0b1] tracking-[0.2em] uppercase mb-4">Válida para</p>
                            <div class="flex items-center justify-center gap-3">
                                <div class="flex-1 h-[1px] bg-[#f4c2d0] opacity-80"></div>
                                <div class="flex items-baseline gap-2">
                                    <span class="font-amiri font-bold text-[#eab6c4] text-[50px] sm:text-[60px] leading-none drop-shadow-sm">2</span>
                                    <span class="font-amiri text-[12px] sm:text-[13px] font-bold tracking-[0.3em] uppercase text-[#7c9787] mb-1">Persona</span>
                                </div>
                                <div class="flex-1 h-[1px] bg-[#f4c2d0] opacity-80"></div>
                            </div>
                        </div>

                        <!-- Texto de Instrucción (Amiri y sin 'font-black') -->
                        <div id="instruction-wrapper" class="absolute -bottom-32 sm:-bottom-40 left-1/2 -translate-x-1/2 w-full text-fade-anim">
                            <p id="instruction-text" class="text-[15px] sm:text-[17px] text-[#5a7d6a] font-bold font-amiri tracking-[0.2em] text-center animate-bounce drop-shadow-md uppercase">
                                Toca el sello para abrir
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="Js\js.js">
    </script>
</body>
</html>
